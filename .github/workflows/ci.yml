name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Ruff format
        run: ruff format --check src tests scripts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Mypy
        run: mypy src/retail_lakehouse

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run non-Spark unit tests
        run: pytest -m "not spark" -q

  test-spark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Spark unit tests
        run: pytest -m spark -q

  coverage:
    runs-on: ubuntu-latest
    needs: [test, test-spark]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=retail_lakehouse --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install -r requirements-dbt.txt pyyaml

      - name: dbt deps and compile
        env:
          DBT_PROFILES_DIR: ./dbt/profiles
          SNOWFLAKE_ACCOUNT: placeholder
          SNOWFLAKE_USER: placeholder
          SNOWFLAKE_PASSWORD: placeholder
          SNOWFLAKE_ROLE: placeholder
          SNOWFLAKE_WAREHOUSE: placeholder
        run: |
          cd dbt
          dbt deps
          dbt compile

      - name: Validate dbt project tests
        run: pytest tests/unit/dbt/ -q

  airflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-airflow.txt

      - name: Validate Airflow DAGs
        env:
          AIRFLOW_HOME: /tmp/airflow
          PYTHONPATH: ${{ github.workspace }}/airflow/include:${{ github.workspace }}/src
        run: pytest tests/unit/airflow/ tests/unit/orchestration/ -q
