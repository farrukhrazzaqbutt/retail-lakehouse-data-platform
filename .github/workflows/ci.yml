name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Ruff format
        run: ruff format --check src tests scripts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Mypy
        run: mypy src/retail_lakehouse

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run non-Spark unit tests
        run: pytest -m "not spark" -q

  test-spark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Spark unit tests
        env:
          SPARK_LOCAL_HOSTNAME: 127.0.0.1
          JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
        run: pytest -m spark -q --tb=short

  coverage:
    runs-on: ubuntu-latest
    needs: [test, test-spark]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          SPARK_LOCAL_HOSTNAME: 127.0.0.1
        run: |
          pytest --cov=retail_lakehouse --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install -r requirements-dbt.txt pytest pyyaml

      - name: dbt deps and parse
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
          SNOWFLAKE_ACCOUNT: xy12345.us-east-1
          SNOWFLAKE_USER: placeholder
          SNOWFLAKE_PASSWORD: placeholder
          SNOWFLAKE_ROLE: placeholder
          SNOWFLAKE_WAREHOUSE: placeholder
        run: |
          cd dbt
          dbt deps
          dbt parse

      - name: Validate dbt project tests
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
          SNOWFLAKE_ACCOUNT: xy12345.us-east-1
          SNOWFLAKE_USER: placeholder
          SNOWFLAKE_PASSWORD: placeholder
          SNOWFLAKE_ROLE: placeholder
          SNOWFLAKE_WAREHOUSE: placeholder
        run: pytest tests/unit/dbt/ -q

  airflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-airflow.txt pytest PyYAML python-dotenv
          pip install "SQLAlchemy>=1.4.36,<2.0"

      - name: Validate Airflow DAGs
        env:
          AIRFLOW_HOME: /tmp/airflow
          AIRFLOW__CORE__UNIT_TEST_MODE: "true"
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow/airflow.db
          PYTHONPATH: ${{ github.workspace }}/airflow/include:${{ github.workspace }}/src
        run: |
          mkdir -p /tmp/airflow
          airflow db migrate
          pytest tests/unit/airflow/ tests/unit/orchestration/ -q
