# Phase 2 file-based source configuration (CSV and JSON landing zones)

product_updates:
  source_system: retail_product_feed
  format: csv
  output_subdir: product_updates
  records_per_file: 50
  update_types:
    - name: price_change
      weight: 0.45
    - name: category_change
      weight: 0.15
    - name: status_change
      weight: 0.20
    - name: description_change
      weight: 0.20
  price_change_pct_range: [-0.25, 0.30]

website_events:
  source_system: retail_web_analytics
  format: json
  output_subdir: website_events
  events_per_file: 200
  event_types:
    - name: page_view
      weight: 0.40
    - name: product_view
      weight: 0.25
    - name: add_to_cart
      weight: 0.15
    - name: checkout_start
      weight: 0.08
    - name: purchase
      weight: 0.07
    - name: search
      weight: 0.05
  devices:
    - name: desktop
      weight: 0.45
    - name: mobile
      weight: 0.40
    - name: tablet
      weight: 0.15
  channels:
    - name: organic
      weight: 0.35
    - name: paid_search
      weight: 0.25
    - name: email
      weight: 0.15
    - name: social
      weight: 0.15
    - name: direct
      weight: 0.10

output:
  landing_dir: ./data/file_sources
  encoding: utf-8
