schema: retail

tables:
  customers:
    name: customers
    primary_key: customer_id
    audit_columns:
      - created_at
      - updated_at
      - source_system

  products:
    name: products
    primary_key: product_id
    audit_columns:
      - created_at
      - updated_at
      - source_system

  orders:
    name: orders
    primary_key: order_id
    foreign_keys:
      customer_id: customers.customer_id
    audit_columns:
      - created_at
      - updated_at
      - source_system

  order_items:
    name: order_items
    primary_key: order_item_id
    foreign_keys:
      order_id: orders.order_id
      product_id: products.product_id
    audit_columns:
      - created_at
      - source_system

  payments:
    name: payments
    primary_key: payment_id
    foreign_keys:
      order_id: orders.order_id
    audit_columns:
      - created_at
      - updated_at
      - source_system

load:
  batch_size: 1000
  truncate_before_load: false
  source_system: retail_postgres_generator
