x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-retail_user}:${POSTGRES_PASSWORD:-change_me_secure_password}@postgres:5432/airflow_db
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-retail_airflow_secret_key}
    RETAIL_PROJECT_ROOT: /opt/retail-lakehouse
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ${POSTGRES_DB:-retail_db}
    POSTGRES_USER: ${POSTGRES_USER:-retail_user}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_secure_password}
    ADLS_LOCAL_LANDING_DIR: /opt/retail-lakehouse/data/lakehouse/raw
    SILVER_BRONZE_ROOT: /opt/retail-lakehouse/data/lakehouse/raw
    SILVER_OUTPUT_ROOT: /opt/retail-lakehouse/data/lakehouse/silver
    GOLD_OUTPUT_ROOT: /opt/retail-lakehouse/data/lakehouse/gold
    SNOWFLAKE_MANIFEST_ROOT: /opt/retail-lakehouse/data/lakehouse/warehouse
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
    SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-}
    SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-RETAIL_DW}
    SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-RAW}
    DBT_PROFILES_DIR: /opt/retail-lakehouse/dbt/profiles
    DBT_TARGET: ${DBT_TARGET:-dev}
    PYTHONPATH: /opt/retail-lakehouse/src:/opt/airflow/include
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/include:/opt/airflow/include
    - ./:/opt/retail-lakehouse
  networks:
    - retail-network
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: retail-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail_db}
      POSTGRES_USER: ${POSTGRES_USER:-retail_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_secure_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-retail_user} -d ${POSTGRES_DB:-retail_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retail-network

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: retail-azurite
    restart: unless-stopped
    ports:
      - "${AZURITE_BLOB_PORT:-10000}:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data"
    networks:
      - retail-network
    profiles:
      - azurite

  airflow-init:
    <<: *airflow-common
    container_name: retail-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Retail \
          --lastname Admin \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    restart: "no"
    profiles:
      - airflow

  airflow-webserver:
    <<: *airflow-common
    container_name: retail-airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    profiles:
      - airflow

  airflow-scheduler:
    <<: *airflow-common
    container_name: retail-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    profiles:
      - airflow

volumes:
  postgres_data:
    driver: local
  azurite_data:
    driver: local

networks:
  retail-network:
    driver: bridge
